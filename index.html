<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ติดตามค่าน้ำค่าไฟ</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // ==========================================
    // 1. สร้าง Icon Components (แทนที่ lucide-react)
    // ==========================================
    const IconWrapper = ({ size = 24, className = "", children }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    
    const Settings = (props) => <IconWrapper {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconWrapper>;
    const Zap = (props) => <IconWrapper {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></IconWrapper>;
    const Droplets = (props) => <IconWrapper {...props}><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7 2.9 7 2.9s-2.29 6.16-2.29 6.16C3.57 10 3 11.08 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 1 14 8.5c1.14.93 1.71 2.03 1.71 3.19 0 2.22-1.8 4.05-4 4.05-2.2 0-4-1.83-4-4.05 0-1.16.57-2.26 1.71-3.19"/></IconWrapper>;
    const Calendar = (props) => <IconWrapper {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></IconWrapper>;
    const Clock = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconWrapper>;
    const ArrowRight = (props) => <IconWrapper {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></IconWrapper>;
    const History = (props) => <IconWrapper {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></IconWrapper>;
    const Plus = (props) => <IconWrapper {...props}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconWrapper>;
    const Trash2 = (props) => <IconWrapper {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></IconWrapper>;
    const CheckCircle2 = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></IconWrapper>;

    // ==========================================
    // 2. React Application Code
    // ==========================================
    function App() {
      const todayStr = new Date().toISOString().split('T')[0];

      const [config, setConfig] = useState({
        electricRate: 8,
        waterRate: 18,
        startDate: todayStr,
        startElectric: '9693',
        startWater: '150'
      });

      const [readings, setReadings] = useState([
        { id: '1', date: todayStr, electric: '9699', water: '155' }
      ]);

      const [newReading, setNewReading] = useState({
        date: todayStr,
        electric: '',
        water: ''
      });

      const handleConfigChange = (e) => {
        const { name, value } = e.target;
        setConfig(prev => ({ ...prev, [name]: value }));
      };

      const handleReadingChange = (e) => {
        const { name, value } = e.target;
        setNewReading(prev => ({ ...prev, [name]: value }));
      };

      const handleSaveReading = (e) => {
        e.preventDefault();
        if (!newReading.electric && !newReading.water) return;

        const newEntry = {
          id: Date.now().toString(),
          date: newReading.date,
          electric: newReading.electric || (latestReading ? latestReading.electric : config.startElectric),
          water: newReading.water || (latestReading ? latestReading.water : config.startWater)
        };

        setReadings([...readings, newEntry]);
        
        setNewReading({
          date: todayStr,
          electric: '',
          water: ''
        });
      };

      const deleteReading = (id) => {
        setReadings(readings.filter(r => r.id !== id));
      };

      const formatDateThai = (dateString) => {
        if (!dateString) return '-';
        const date = new Date(dateString);
        const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
        return `${date.getDate()} ${months[date.getMonth()]}`;
      };

      const getDaysDiff = (startStr, endStr) => {
        if (!startStr || !endStr) return 0;
        const d1 = new Date(startStr);
        const d2 = new Date(endStr);
        d1.setHours(0,0,0,0);
        d2.setHours(0,0,0,0);
        const diffTime = d2 - d1;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        return diffDays >= 0 ? diffDays : 0;
      };

      const sortedReadings = useMemo(() => {
        return [...readings].sort((a, b) => new Date(a.date) - new Date(b.date));
      }, [readings]);

      const latestReading = sortedReadings.length > 0 ? sortedReadings[sortedReadings.length - 1] : null;

      const startElec = parseFloat(config.startElectric) || 0;
      const startWat = parseFloat(config.startWater) || 0;
      
      const currentElec = latestReading ? parseFloat(latestReading.electric) || startElec : startElec;
      const currentWat = latestReading ? parseFloat(latestReading.water) || startWat : startWat;
      const currentDate = latestReading ? latestReading.date : config.startDate;

      const elecUsed = Math.max(0, currentElec - startElec);
      const watUsed = Math.max(0, currentWat - startWat);
      
      const elecCost = elecUsed * (parseFloat(config.electricRate) || 0);
      const watCost = watUsed * (parseFloat(config.waterRate) || 0);
      
      const daysPassed = getDaysDiff(config.startDate, currentDate);

      return (
        <div className="min-h-screen bg-[#F7F6F2] text-[#4A453F] font-sans p-4 md:p-8">
          <div className="max-w-5xl mx-auto space-y-6">
            
            <header className="text-center space-y-2 pt-2 pb-4">
              <h1 className="text-3xl font-semibold tracking-tight text-[#3A3530]">
                ติดตามค่าน้ำค่าไฟ
              </h1>
              <p className="text-[#8C847A] text-sm">จดเลขมิเตอร์ง่ายๆ รู้ยอดสะสมแบบเรียลไทม์</p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
              <div className="lg:col-span-5 space-y-6">
                
                <div className="bg-white p-5 rounded-2xl shadow-sm border border-[#EBE8E0]">
                  <div className="flex items-center gap-2 mb-5 text-[#6A645A] border-b border-[#F2F0EA] pb-3">
                    <Settings size={20} className="text-[#8B8070]" />
                    <h2 className="text-lg font-medium">ตั้งค่าเริ่มต้นรอบบิล</h2>
                  </div>
                  
                  <div className="space-y-4">
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-xs text-[#8C847A] mb-1">เริ่มตัดรอบวันที่</label>
                        <input 
                          type="date" 
                          name="startDate"
                          value={config.startDate}
                          onChange={handleConfigChange}
                          className="w-full bg-[#FAFAFA] border border-[#E0DCD3] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#B5AA9D]"
                        />
                      </div>
                      <div>
                        <label className="block text-xs text-[#8C847A] mb-1">ค่าไฟ-น้ำ (บ./หน่วย)</label>
                        <div className="flex gap-2">
                          <input 
                            type="number" 
                            name="electricRate"
                            value={config.electricRate}
                            onChange={handleConfigChange}
                            placeholder="ไฟ"
                            className="w-full bg-[#FAFAFA] border border-[#E0DCD3] rounded-lg px-2 py-2 text-sm text-center focus:outline-none focus:border-[#B5AA9D] text-[#D4B572] font-medium"
                          />
                          <input 
                            type="number" 
                            name="waterRate"
                            value={config.waterRate}
                            onChange={handleConfigChange}
                            placeholder="น้ำ"
                            className="w-full bg-[#FAFAFA] border border-[#E0DCD3] rounded-lg px-2 py-2 text-sm text-center focus:outline-none focus:border-[#B5AA9D] text-[#8FB8DE] font-medium"
                          />
                        </div>
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div className="bg-[#FDFAEF] p-3 rounded-lg border border-[#F2EFE6]">
                        <label className="flex items-center gap-1.5 text-xs text-[#8C847A] mb-1">
                          <Zap size={14} className="text-[#D4B572]" /> มิเตอร์ไฟเริ่มต้น
                        </label>
                        <input 
                          type="number" 
                          name="startElectric"
                          value={config.startElectric}
                          onChange={handleConfigChange}
                          className="w-full bg-white border border-[#E0DCD3] rounded-md px-3 py-1.5 text-sm focus:outline-none focus:border-[#D4B572]"
                        />
                      </div>
                      <div className="bg-[#F0F6FA] p-3 rounded-lg border border-[#E6EEF4]">
                        <label className="flex items-center gap-1.5 text-xs text-[#8C847A] mb-1">
                          <Droplets size={14} className="text-[#8FB8DE]" /> มิเตอร์น้ำเริ่มต้น
                        </label>
                        <input 
                          type="number" 
                          name="startWater"
                          value={config.startWater}
                          onChange={handleConfigChange}
                          className="w-full bg-white border border-[#E0DCD3] rounded-md px-3 py-1.5 text-sm focus:outline-none focus:border-[#8FB8DE]"
                        />
                      </div>
                    </div>
                  </div>
                </div>

                <div className="bg-[#4A453F] p-5 rounded-2xl shadow-sm text-white">
                  <div className="flex items-center gap-2 mb-4 text-[#EBE8E0]">
                    <Plus size={20} />
                    <h2 className="text-lg font-medium">จดมิเตอร์วันนี้</h2>
                  </div>
                  <form onSubmit={handleSaveReading} className="space-y-4">
                    <div>
                      <label className="block text-xs text-[#A8A096] mb-1">วันที่จด</label>
                      <input 
                        type="date" 
                        name="date"
                        value={newReading.date}
                        onChange={handleReadingChange}
                        className="w-full bg-[#5C564F] border border-[#6A645A] rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-[#B5AA9D]"
                      />
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="flex items-center gap-1 block text-xs text-[#A8A096] mb-1">
                          <Zap size={12} className="text-[#D4B572]"/> เลขมิเตอร์ไฟ
                        </label>
                        <input 
                          type="number" 
                          name="electric"
                          value={newReading.electric}
                          onChange={handleReadingChange}
                          placeholder="เช่น 9699"
                          className="w-full bg-[#5C564F] border border-[#6A645A] rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-[#D4B572]"
                        />
                      </div>
                      <div>
                        <label className="flex items-center gap-1 block text-xs text-[#A8A096] mb-1">
                          <Droplets size={12} className="text-[#8FB8DE]"/> เลขมิเตอร์น้ำ
                        </label>
                        <input 
                          type="number" 
                          name="water"
                          value={newReading.water}
                          onChange={handleReadingChange}
                          placeholder="เช่น 155"
                          className="w-full bg-[#5C564F] border border-[#6A645A] rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-[#8FB8DE]"
                        />
                      </div>
                    </div>

                    <button 
                      type="submit"
                      className="w-full mt-2 bg-[#8B8070] hover:bg-[#9B9080] text-white py-2.5 rounded-lg transition-colors text-sm font-medium shadow-sm"
                    >
                      บันทึกมิเตอร์
                    </button>
                  </form>
                </div>

              </div>

              <div className="lg:col-span-7 space-y-6">
                
                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-[#EBE8E0] relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-[#D4B572] via-[#8B8070] to-[#8FB8DE]"></div>
                  
                  <div className="flex items-center justify-between mb-6">
                    <div>
                      <h2 className="text-xl font-semibold text-[#3A3530]">สรุปรอบปัจจุบัน</h2>
                      <p className="text-xs text-[#8C847A] mt-1">ตัดรอบเริ่มวันที่ {formatDateThai(config.startDate)}</p>
                    </div>
                    <div className="bg-[#F7F6F2] px-3 py-1.5 rounded-full text-xs font-medium text-[#6A645A] flex items-center gap-1.5">
                      <Clock size={14} /> ผ่านมาแล้ว {daysPassed} วัน
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-4 text-sm bg-[#FCFBF9] p-4 rounded-xl mb-6 border border-[#F2F0EA]">
                    <div className="space-y-1">
                      <div className="flex items-center gap-1.5 text-[#8C847A]">
                        <Calendar size={14} /> วันที่เริ่ม
                      </div>
                      <div className="font-medium">{formatDateThai(config.startDate)} <span className="text-xs text-[#B5AA9D] font-normal">(มิเตอร์ไฟ {startElec}, น้ำ {startWat})</span></div>
                    </div>
                    <div className="space-y-1">
                      <div className="flex items-center gap-1.5 text-[#8C847A]">
                        <ArrowRight size={14} /> วันที่ล่าสุด
                      </div>
                      <div className="font-medium">{formatDateThai(currentDate)} <span className="text-xs text-[#B5AA9D] font-normal">(มิเตอร์ไฟ {currentElec}, น้ำ {currentWat})</span></div>
                    </div>
                  </div>

                  <div className="space-y-5">
                    <div>
                      <div className="flex items-center gap-2 mb-2 font-medium text-[#5C564F]">
                        <Zap size={16} className="text-[#D4B572]" /> การใช้ไฟ
                      </div>
                      <div className="pl-6 text-sm space-y-1.5">
                        <div className="flex justify-between text-[#6A645A]">
                          <span>ใช้ไป: {currentElec} − {startElec}</span>
                          <span className="font-medium text-[#4A453F]">{elecUsed} หน่วย</span>
                        </div>
                        <div className="flex justify-between text-[#6A645A]">
                          <span>หน่วยละ:</span>
                          <span>{config.electricRate} บาท</span>
                        </div>
                        <div className="flex justify-between text-[#4A453F] pt-1 border-t border-dashed border-[#E0DCD3]">
                          <span>👉 ค่าไฟสะสมตอนนี้</span>
                          <span className="font-semibold text-base text-[#B38F42]">{elecCost.toLocaleString()} บาท</span>
                        </div>
                      </div>
                    </div>

                    <div>
                      <div className="flex items-center gap-2 mb-2 font-medium text-[#5C564F]">
                        <Droplets size={16} className="text-[#8FB8DE]" /> การใช้น้ำ
                      </div>
                      <div className="pl-6 text-sm space-y-1.5">
                        <div className="flex justify-between text-[#6A645A]">
                          <span>ใช้ไป: {currentWat} − {startWat}</span>
                          <span className="font-medium text-[#4A453F]">{watUsed} หน่วย</span>
                        </div>
                        <div className="flex justify-between text-[#6A645A]">
                          <span>หน่วยละ:</span>
                          <span>{config.waterRate} บาท</span>
                        </div>
                        <div className="flex justify-between text-[#4A453F] pt-1 border-t border-dashed border-[#E0DCD3]">
                          <span>👉 ค่าน้ำสะสมตอนนี้</span>
                          <span className="font-semibold text-base text-[#6894BA]">{watCost.toLocaleString()} บาท</span>
                        </div>
                      </div>
                    </div>

                    <div className="mt-6 bg-[#4A453F] text-white p-4 rounded-xl flex items-center justify-between">
                      <div className="flex items-center gap-2">
                        <CheckCircle2 size={20} className="text-[#D4B572]" />
                        <span className="font-medium">ยอดรวมสะสมตอนนี้</span>
                      </div>
                      <div className="text-2xl font-bold tracking-tight">
                        {(elecCost + watCost).toLocaleString()} <span className="text-sm font-normal text-[#B5AA9D]">บาท</span>
                      </div>
                    </div>

                  </div>
                </div>

                <div className="bg-white p-5 rounded-2xl shadow-sm border border-[#EBE8E0]">
                  <div className="flex items-center justify-between mb-4">
                    <div className="flex items-center gap-2 text-[#6A645A]">
                      <History size={18} />
                      <h3 className="font-medium text-sm">ประวัติการจด (รอบบิลปัจจุบัน)</h3>
                    </div>
                  </div>

                  {sortedReadings.length === 0 ? (
                    <div className="text-center text-sm text-[#B5AA9D] py-4 border border-dashed border-[#EBE8E0] rounded-xl">
                      ยังไม่ได้จดมิเตอร์ในรอบบิลนี้
                    </div>
                  ) : (
                    <div className="space-y-2">
                      {sortedReadings.slice().reverse().map((record) => (
                        <div key={record.id} className="flex items-center justify-between p-3 bg-[#FCFBF9] hover:bg-[#F7F6F2] border border-[#F2F0EA] rounded-xl transition-colors">
                          <div className="flex items-center gap-3">
                            <div className="bg-white px-2 py-1 rounded text-xs font-medium text-[#8C847A] border border-[#EBE8E0]">
                              {formatDateThai(record.date)}
                            </div>
                            <div className="flex gap-3 text-xs">
                              <span className="flex items-center gap-1 text-[#6A645A]"><Zap size={12} className="text-[#D4B572]"/> {record.electric}</span>
                              <span className="flex items-center gap-1 text-[#6A645A]"><Droplets size={12} className="text-[#8FB8DE]"/> {record.water}</span>
                            </div>
                          </div>
                          <button 
                            onClick={() => deleteReading(record.id)}
                            className="text-[#D1ACA5] hover:text-[#B57C72] p-1.5 hover:bg-[#FDF8F7] rounded-md transition-colors"
                          >
                            <Trash2 size={14} />
                          </button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

              </div>
            </div>

          </div>
        </div>
      );
    }

    // ==========================================
    // 3. Render App ลงใน DOM
    // ==========================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
