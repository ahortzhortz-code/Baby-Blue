<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ติดตามค่าน้ำค่าไฟ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-[#F7F6F2] text-[#4A453F] p-4 md:p-8">

  <div class="max-w-5xl mx-auto space-y-6">
    
    <header class="text-center space-y-2 pt-2 pb-4">
      <h1 class="text-3xl font-semibold tracking-tight text-[#3A3530]">ติดตามค่าน้ำค่าไฟ</h1>
      <p class="text-[#8C847A] text-sm">จดเลขมิเตอร์ง่ายๆ รู้ยอดสะสมแบบเรียลไทม์</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      
      <div class="lg:col-span-5 space-y-6">
        
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-[#EBE8E0]">
          <div class="flex items-center gap-2 mb-5 text-[#6A645A] border-b border-[#F2F0EA] pb-3">
            <i data-lucide="settings" class="w-5 h-5 text-[#8B8070]"></i>
            <h2 class="text-lg font-medium">ตั้งค่าเริ่มต้นรอบบิล</h2>
          </div>
          
          <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs text-[#8C847A] mb-1">เริ่มตัดรอบวันที่</label>
                <input type="date" id="configStartDate" class="w-full bg-[#FAFAFA] border border-[#E0DCD3] rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-[#B5AA9D]">
              </div>
              <div>
                <label class="block text-xs text-[#8C847A] mb-1">ค่าไฟ-น้ำ (บ./หน่วย)</label>
                <div class="flex gap-2">
                  <input type="number" id="configElectricRate" placeholder="ไฟ" class="w-full bg-[#FAFAFA] border border-[#E0DCD3] rounded-lg px-2 py-2 text-sm text-center focus:outline-none focus:border-[#B5AA9D] text-[#D4B572] font-medium">
                  <input type="number" id="configWaterRate" placeholder="น้ำ" class="w-full bg-[#FAFAFA] border border-[#E0DCD3] rounded-lg px-2 py-2 text-sm text-center focus:outline-none focus:border-[#B5AA9D] text-[#8FB8DE] font-medium">
                </div>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div class="bg-[#FDFAEF] p-3 rounded-lg border border-[#F2EFE6]">
                <label class="flex items-center gap-1.5 text-xs text-[#8C847A] mb-1">
                  <i data-lucide="zap" class="w-3.5 h-3.5 text-[#D4B572]"></i> มิเตอร์ไฟเริ่มต้น
                </label>
                <input type="number" id="configStartElectric" class="w-full bg-white border border-[#E0DCD3] rounded-md px-3 py-1.5 text-sm focus:outline-none focus:border-[#D4B572]">
              </div>
              <div class="bg-[#F0F6FA] p-3 rounded-lg border border-[#E6EEF4]">
                <label class="flex items-center gap-1.5 text-xs text-[#8C847A] mb-1">
                  <i data-lucide="droplets" class="w-3.5 h-3.5 text-[#8FB8DE]"></i> มิเตอร์น้ำเริ่มต้น
                </label>
                <input type="number" id="configStartWater" class="w-full bg-white border border-[#E0DCD3] rounded-md px-3 py-1.5 text-sm focus:outline-none focus:border-[#8FB8DE]">
              </div>
            </div>
          </div>
        </div>

        <div class="bg-[#4A453F] p-5 rounded-2xl shadow-sm text-white">
          <div class="flex items-center gap-2 mb-4 text-[#EBE8E0]">
            <i data-lucide="plus" class="w-5 h-5"></i>
            <h2 class="text-lg font-medium">จดมิเตอร์วันนี้</h2>
          </div>
          <form id="readingForm" class="space-y-4">
            <div>
              <label class="block text-xs text-[#A8A096] mb-1">วันที่จด</label>
              <input type="date" id="newDate" required class="w-full bg-[#5C564F] border border-[#6A645A] rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-[#B5AA9D]">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-xs text-[#A8A096] mb-1 flex items-center gap-1">
                  <i data-lucide="zap" class="w-3 h-3 text-[#D4B572]"></i> เลขมิเตอร์ไฟ
                </label>
                <input type="number" id="newElectric" placeholder="เช่น 9699" class="w-full bg-[#5C564F] border border-[#6A645A] rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-[#D4B572]">
              </div>
              <div>
                <label class="block text-xs text-[#A8A096] mb-1 flex items-center gap-1">
                  <i data-lucide="droplets" class="w-3 h-3 text-[#8FB8DE]"></i> เลขมิเตอร์น้ำ
                </label>
                <input type="number" id="newWater" placeholder="เช่น 155" class="w-full bg-[#5C564F] border border-[#6A645A] rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-[#8FB8DE]">
              </div>
            </div>

            <button type="submit" class="w-full mt-2 bg-[#8B8070] hover:bg-[#9B9080] text-white py-2.5 rounded-lg transition-colors text-sm font-medium shadow-sm">
              บันทึกมิเตอร์
            </button>
          </form>
        </div>

      </div>

      <div class="lg:col-span-7 space-y-6">
        
        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-[#EBE8E0] relative overflow-hidden">
          <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-[#D4B572] via-[#8B8070] to-[#8FB8DE]"></div>
          
          <div class="flex items-center justify-between mb-6">
            <div>
              <h2 class="text-xl font-semibold text-[#3A3530]">สรุปรอบปัจจุบัน</h2>
              <p class="text-xs text-[#8C847A] mt-1" id="displayStartCutoff">ตัดรอบเริ่มวันที่ -</p>
            </div>
            <div class="bg-[#F7F6F2] px-3 py-1.5 rounded-full text-xs font-medium text-[#6A645A] flex items-center gap-1.5">
              <i data-lucide="clock" class="w-3.5 h-3.5"></i> <span id="displayDaysPassed">ผ่านมาแล้ว 0 วัน</span>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4 text-sm bg-[#FCFBF9] p-4 rounded-xl mb-6 border border-[#F2F0EA]">
            <div class="space-y-1">
              <div class="flex items-center gap-1.5 text-[#8C847A]">
                <i data-lucide="calendar" class="w-3.5 h-3.5"></i> วันที่เริ่ม
              </div>
              <div class="font-medium">
                <span id="displayStartDate">-</span> 
                <span class="text-xs text-[#B5AA9D] font-normal" id="displayStartMeters">(มิเตอร์ไฟ 0, น้ำ 0)</span>
              </div>
            </div>
            <div class="space-y-1">
              <div class="flex items-center gap-1.5 text-[#8C847A]">
                <i data-lucide="arrow-right" class="w-3.5 h-3.5"></i> วันที่ล่าสุด
              </div>
              <div class="font-medium">
                <span id="displayCurrentDate">-</span> 
                <span class="text-xs text-[#B5AA9D] font-normal" id="displayCurrentMeters">(มิเตอร์ไฟ 0, น้ำ 0)</span>
              </div>
            </div>
          </div>

          <div class="space-y-5">
            
            <div>
              <div class="flex items-center gap-2 mb-2 font-medium text-[#5C564F]">
                <i data-lucide="zap" class="w-4 h-4 text-[#D4B572]"></i> การใช้ไฟ
              </div>
              <div class="pl-6 text-sm space-y-1.5">
                <div class="flex justify-between text-[#6A645A]">
                  <span id="displayElecFormula">ใช้ไป:
